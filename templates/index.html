<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贾的临时传输</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; }
        body { background: #f5f5f5; }
        .canvas { background: #fff; min-height: 100vh; padding: 16px; }
        textarea { width: 100%; min-height: 80px; border: none; outline: none; font-size: 16px; line-height: 1.6; resize: none; padding: 0; font-family: inherit; overflow: hidden; }
        textarea::placeholder { color: #ccc; }
        .hint { font-size: 12px; color: #ccc; text-align: center; padding: 12px 0; }
        .refresh { color: #007AFF; font-size: 13px; cursor: pointer; font-weight: normal; }
        .img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .img-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #eee; cursor: pointer; }
        .img-item img { width: 100%; height: 100%; object-fit: cover; }
        .img-del { position: absolute; top: 4px; right: 4px; background: rgba(255,59,48,0.9); color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
        .empty { text-align: center; color: #999; padding: 30px 0; font-size: 14px; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 32px; cursor: pointer; }
        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; display: none; z-index: 999; pointer-events: none; }
        .paste-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 12px 0; }
        .header h1 { font-size: 18px; font-weight: 600; color: #333; }
        .upload-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #666; }
        .upload-btn:hover { border-color: #007AFF; color: #007AFF; }
        .upload-btn svg { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>贾的临时传输</h1>
        <div class="upload-btn" onclick="document.getElementById('fileInput').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        </div>
    </div>

    <div class="canvas">
        <textarea id="editor" placeholder="在这里输入文字..." oninput="onTextChange()"></textarea>
        <div id="images"></div>
        <div class="hint">文字实时同步 / 退格删除 / 粘贴图片</div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img">
    </div>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFileSelect(event)">
    <div id="msg"></div>
    <div class="paste-hint" id="pasteHint">📋 检测到有图片粘贴</div>

    <script>
        let saveTimer = null;
        let lastText = '';

        function showMsg(t) {
            const e = document.getElementById('msg');
            e.textContent = t; e.style.display = 'block';
            setTimeout(() => e.style.display = 'none', 1500);
        }

        function showPasteHint() {
            const e = document.getElementById('pasteHint');
            e.style.display = 'block';
            setTimeout(() => e.style.display = 'none', 2000);
        }

        async function syncText() {
            const text = document.getElementById('editor').value;
            if (text === lastText) return;
            lastText = text;
            try {
                await fetch('/content', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
            } catch (e) { console.error('sync failed', e); }
        }

        function onTextChange() {
            const ta = document.getElementById('editor');
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
            if (saveTimer) clearTimeout(saveTimer);
            saveTimer = setTimeout(syncText, 500);
        }

        function onKeyDown(e) {
            if (e.key === 'Backspace' || e.key === 'Delete') {
                // 实时删除，debounce handled by onTextChange
            }
        }

        async function loadContent() {
            try {
                const res = await fetch('/content');
                const data = await res.json();
                const editor = document.getElementById('editor');
                // Only sync from server if user is not currently editing
                if (document.activeElement === editor) return;
                if (data.text !== undefined && data.text !== editor.value) {
                    editor.value = data.text;
                    lastText = data.text;
                    editor.style.height = 'auto';
                    editor.style.height = editor.scrollHeight + 'px';
                }
            } catch (e) {}
        }

        async function uploadImages(files) {
            const fd = new FormData();
            files.forEach(f => fd.append('files', f));
            const res = await fetch('/upload-image', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.files_saved && data.files_saved.length > 0) {
                showMsg('上传 ' + data.files_saved.length + ' 张图片');
                loadImages();
            }
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                uploadImages(files);
            }
        }

        async function deleteFile(filename) {
            if (!confirm('删除这张图片?')) return;
            await fetch('/delete/' + encodeURIComponent(filename), { method: 'POST' });
            loadImages();
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        async function loadImages() {
            try {
                const res = await fetch('/list');
                const data = await res.json();
                const imgEl = document.getElementById('images');
                const imgFiles = data.files.filter(f => /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(f));
                if (imgFiles.length === 0) {
                    imgEl.innerHTML = '<div class="empty">暂无图片，粘贴或拖拽图片到此处</div>';
                } else {
                    imgEl.innerHTML = '<div class="img-grid">' + imgFiles.map(f =>
                        '<div class="img-item" onclick="openLightbox(\'/data/' + encodeURIComponent(f) + '\')">' +
                        '<img src="/data/' + encodeURIComponent(f) + '" alt="">' +
                        '<div class="img-del" onclick="event.stopPropagation(); deleteFile(\'' + f + '\')">&times;</div></div>'
                    ).join('') + '</div>';
                }
            } catch (e) { showMsg('加载失败'); }
        }

        // Paste image support
        document.addEventListener('paste', async (e) => {
            const items = e.clipboardData.items;
            const imageFiles = [];
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    if (blob) imageFiles.push(blob);
                }
            }
            if (imageFiles.length > 0) {
                e.preventDefault();
                showPasteHint();
                await uploadImages(imageFiles);
            }
        });

        // Poll for changes from other devices
        setInterval(() => {
            loadContent();
            loadImages();
        }, 3000);

        loadContent();
        loadImages();
    </script>
</body>
</html>
